<!DOCTYPE html>
<html lang="en" dir="ltr" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- CORRECTED SYSTEM SPECIFICATION: INLINE ENCODED SVG ICON LINK -->
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' fill='none' stroke='%2310b981' stroke-width='2.5' viewBox='0 0 24 24'><path stroke-linecap='round' stroke-linejoin='round' d='M13 10V3L4 14h7v7l9-11h-7z'/></svg>">
    <title>VoltRide | Page Not Found (404)</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Alpine.js CDN for interactive state management -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <!-- Premium Clean Font: Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
    </style>

    <script>
        // Tailwind Custom Configuration for Brand Elements
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#ecfdf5',
                            100: '#d1fae5',
                            500: '#10b981', // Emerald primary brand color
                            600: '#059669',
                            700: '#047857',
                        }
                    },
                    screens: {
                        'xs': '360px', // Custom ultra-mobile breakpoint specified
                    }
                }
            }
        }
    </script>
</head>
<body 
    x-data="{ 
        darkMode: localStorage.getItem('darkMode') === 'true', 
        isRtl: localStorage.getItem('isRtl') === 'true'
    }"
    x-init="
        $watch('darkMode', value => localStorage.setItem('darkMode', value));
        $watch('isRtl', value => localStorage.setItem('isRtl', value));
    "
    :class="{ 'dark': darkMode }"
    :dir="isRtl ? 'rtl' : 'ltr'"
    class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100 min-h-screen flex flex-col antialiased transition-colors duration-300"
>

    <!-- HEADER / TOP CONTROL BAR -->
    <header class="w-full bg-transparent absolute top-0 left-0 z-50">
        <div class="max-w-7xl mx-auto px-4 xs:px-6 sm:px-8 lg:px-12 h-20 flex items-center justify-between">
            
            <!-- Name & Logo in Top Left Corner -->
            <a href="index.html" class="flex items-center gap-2 font-bold text-xl tracking-tight text-slate-900 dark:text-white group focus:outline-none">
                <svg class="w-8 h-8 text-brand-500 transition-transform group-hover:scale-105" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" />
                </svg>
                <span>Volt<span class="text-brand-500">Ride</span></span>
            </a>

            <!-- System Control Toggles -->
            <div class="flex items-center gap-2 sm:gap-3">
                <!-- LTR/RTL Layout Toggle Button -->
                <button 
                    @click="isRtl = !isRtl" 
                    class="px-3 py-2 rounded-xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800/80 text-slate-500 dark:text-slate-400 hover:text-brand-500 dark:hover:text-brand-500 text-xs font-semibold shadow-sm transition-all focus:outline-none"
                    title="Toggle Layout Direction"
                >
                    <span x-text="isRtl ? 'LTR' : 'RTL'"></span>
                </button>

                <!-- Dark/Light Mode Toggle Button -->
                <button 
                    @click="darkMode = !darkMode" 
                    class="p-2 rounded-xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800/80 text-slate-500 dark:text-slate-400 hover:text-brand-500 dark:hover:text-brand-500 shadow-sm transition-all focus:outline-none"
                    title="Toggle Theme"
                >
                    <!-- Sun Icon -->
                    <svg x-show="darkMode" class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="display: none;"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M14 12a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
                    <!-- Moon Icon -->
                    <svg x-show="!darkMode" class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
                </button>
            </div>

        </div>
    </header>

    <!-- MAIN 404 CONTENT HERO AREA -->
    <main class="flex-grow flex items-center justify-center pt-24 pb-12 px-4 xs:px-6 sm:px-8 relative overflow-hidden">
        
        <!-- Abstract Fleet Design Accents (Background Depth) -->
        <div class="absolute top-1/3 left-1/2 -translate-x-1/2 -translate-y-1/2 w-96 h-96 rounded-full bg-brand-500/5 blur-3xl pointer-events-none"></div>

        <div class="w-full max-w-xl text-center space-y-6 relative z-10 my-auto">
            
            <!-- Graphic 404 Illustration Error Header Area -->
            <div class="relative inline-flex items-center justify-center">
                <!-- Large Background Typography Token (Font Weight: 600) -->
                <span class="text-[7rem] xs:text-[9rem] sm:text-[11rem] font-bold tracking-tighter text-slate-200/50 dark:text-slate-900 leading-none select-none">
                    404
                </span>
                
                <!-- Floating Scooter Minimalist Graphic Icon Frame -->
                <div class="absolute inset-0 flex items-center justify-center transform -rotate-6 animate-bounce" style="animation-duration: 3s;">
                    <div class="p-4 rounded-2xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 shadow-xl shadow-slate-200/50 dark:shadow-none text-brand-500">
                        <svg class="w-12 h-12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" />
                        </svg>
                    </div>
                </div>
            </div>

            <!-- Error Copy Description Text (Font Weight: 400 - 600) -->
            <div class="space-y-3 px-2 xs:px-4">
                <h1 class="text-2xl xs:text-3xl font-semibold tracking-tight text-slate-900 dark:text-white leading-tight">
                    Looks Like You've Veered Off Route
                </h1>
                <p class="text-slate-500 dark:text-slate-400 font-normal text-sm sm:text-base max-w-md mx-auto leading-relaxed">
                    The path you are looking for has been moved, archived, or temporarily locked down. Let's get you back to the main track.
                </p>
            </div>

            <!-- Responsive Navigation Action Layout Cluster (Handles 360px up to Desktop widths) -->
            <div class="pt-4 flex flex-col xs:flex-row items-center justify-center gap-3 w-full max-w-xs xs:max-w-none mx-auto px-4 xs:px-0">
                <!-- Primary Anchor -->
                <a 
                    href="index.html" 
                    class="w-full xs:w-auto px-6 py-3.5 bg-brand-500 hover:bg-brand-600 text-white font-medium text-sm rounded-xl shadow-lg shadow-brand-500/10 active:scale-[0.98] transition-all tracking-wide text-center"
                >
                    Return to Homepage
                </a>
                
                <!-- Secondary Anchor -->
                <a 
                    href="contact.html" 
                    class="w-full xs:w-auto px-6 py-3.5 bg-white dark:bg-slate-900 hover:bg-slate-50 dark:hover:bg-slate-8.50 text-slate-700 dark:text-slate-200 border border-slate-200 dark:border-slate-800 font-medium text-sm rounded-xl active:scale-[0.98] transition-all tracking-wide text-center"
                >
                    Contact Live Support
                </a>
            </div>

            <!-- Micro-Link Checklist Breadcrumbs -->
            <div class="pt-8 flex flex-wrap items-center justify-center gap-x-4 gap-y-2 text-xs font-normal text-slate-400">
                <a href="service.html" class="hover:text-brand-500 transition-colors">Tour Packages</a>
                <span class="w-1 h-1 rounded-full bg-slate-300 dark:bg-slate-800"></span>
                <a href="booknow.html" class="hover:text-brand-500 transition-colors">Rental Fleet</a>
                <span class="w-1 h-1 rounded-full bg-slate-300 dark:bg-slate-800"></span>
                <a href="aboutus.html" class="hover:text-brand-500 transition-colors">Safety Matrix</a>
            </div>

        </div>
    </main>

</body>
</html>
